<!DOCTYPE html>
<html>
<head>
    <title>Мои игры</title>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: white;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        h1 {
            font-size: 48px;
            margin-bottom: 10px;
        }
        .games {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-top: 40px;
        }
        .game-card {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 20px;
            width: 200px;
            text-decoration: none;
            color: white;
            transition: transform 0.3s;
        }
        .game-card:hover {
            transform: scale(1.05);
            background: rgba(255,255,255,0.2);
        }
        .game-card h3 {
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <h1>🎮 Мои игры</h1>
    <p>Играй прямо в браузере!</p>
    
    <div class="games">
        <a href="snake/" class="game-card">
            <div style="font-size: 48px;">🐍</div>
            <h3>Змейка</h3>
            <p>Классическая игра</p>
        </a>
        <!-- Добавляй сюда другие игры по такому же шаблону -->
    </div>
</body>
</html>
